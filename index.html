<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOID RUNNER</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>body { margin: 0; background: #060a12; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── SCENE RENDERER ────────────────────────────────────────────────────────

    const P = 2, GW = 80, GH = 40; // canvas is 160×80, each "pixel" = 2×2

    function seededRng(seed) {
      let s = (seed ^ 0xdeadbeef) >>> 0;
      return () => { s ^= s << 13; s ^= s >> 17; s ^= s << 5; return (s >>> 0) / 0x100000000; };
    }

    function gfx(ctx, gx, gy, col, a = 1) {
      if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) return;
      ctx.globalAlpha = a; ctx.fillStyle = col;
      ctx.fillRect(gx * P, gy * P, P, P);
    }
    function gRect(ctx, gx, gy, gw, gh, col, a = 1) {
      ctx.globalAlpha = a; ctx.fillStyle = col;
      ctx.fillRect(gx * P, gy * P, gw * P, gh * P);
    }
    function starField(ctx, t, rng, n = 22) {
      for (let i = 0; i < n; i++) {
        const x = Math.floor(rng() * GW), y = Math.floor(rng() * GH);
        const b = 0.3 + rng() * 0.7, f = 0.4 + rng() * 2;
        gfx(ctx, x, y, '#ffffff', b * (0.5 + 0.5 * Math.sin(t * f + i * 1.9)));
      }
    }

    function drawVoid(ctx, t, rng) {
      gRect(ctx, 0, 0, GW, GH, '#020410');
      ctx.globalAlpha = 0.18; ctx.fillStyle = '#1a0840';
      ctx.fillRect(80, 0, 80, 50); ctx.globalAlpha = 0.10;
      ctx.fillStyle = '#0a1060'; ctx.fillRect(100, 0, 60, 35); ctx.globalAlpha = 1;
      // Planet arc bottom-left
      for (let gx = 0; gx < 22; gx++) for (let gy = 22; gy < GH; gy++) {
        const dx = gx + 8, dy = gy - (GH + 8);
        if (dx*dx + dy*dy < 22*22) {
          gfx(ctx, gx, gy, '#0d2040', 0.9);
          if (dx*dx + dy*dy > 18*18) gfx(ctx, gx, gy, '#1a3860', 0.5);
        }
      }
      starField(ctx, t, rng);
    }

    function drawShip(ctx, t, rng) {
      gRect(ctx, 0, 0, GW, GH, '#040408');
      const VX = 40*P, VY = 20*P, IW = 12*P, IH = 13*P;
      const face = (pts, col) => {
        ctx.globalAlpha = 1; ctx.fillStyle = col;
        ctx.beginPath(); ctx.moveTo(...pts[0]);
        pts.slice(1).forEach(p => ctx.lineTo(...p)); ctx.closePath(); ctx.fill();
      };
      face([[0,0],[GW*P,0],[VX+IW,VY-IH],[VX-IW,VY-IH]], '#131320');
      face([[0,GH*P],[GW*P,GH*P],[VX+IW,VY+IH],[VX-IW,VY+IH]], '#181820');
      face([[0,0],[0,GH*P],[VX-IW,VY+IH],[VX-IW,VY-IH]], '#0d0d16');
      face([[GW*P,0],[GW*P,GH*P],[VX+IW,VY+IH],[VX+IW,VY-IH]], '#0f0f18');
      ctx.globalAlpha = 1; ctx.fillStyle = '#020206';
      ctx.fillRect(VX-IW, VY-IH, IW*2, IH*2);
      // Overhead light flicker
      const fl = 0.6 + 0.4 * Math.sin(t * 7.3 + Math.sin(t * 2.1) * 2);
      gRect(ctx, 33, 0, 14, 2, '#8888ee', 0.28 * fl);
      gRect(ctx, 29, 2, 22, 3, '#3333aa', 0.10 * fl);
      // Pipes
      [4,11,20,29].forEach(y => gRect(ctx, 0, y, 21, 1, '#18202a', 0.85));
      [6,14,22,31].forEach(y => gRect(ctx, 59, y, 21, 1, '#1a2020', 0.85));
      [34,36,38].forEach(y => gRect(ctx, 0, y, GW, 1, '#202030', 0.18));
    }

    function drawDerelict(ctx, t, rng) {
      gRect(ctx, 0, 0, GW, GH, '#020205');
      gRect(ctx, 0, 0, 13, GH, '#050509', 0.9);
      gRect(ctx, 67, 0, 13, GH, '#040408', 0.9);
      [[8,0,10,3],[34,0,14,2],[57,0,11,4]].forEach(([x,y,w,h]) => gRect(ctx,x,y,w,h,'#0a0a14'));
      [11,23,37,52,65,78,88].forEach((s, i) => {
        const r = seededRng(s);
        const bx = Math.floor(r() * 52) + 10, by = Math.floor(r() * 26) + 5;
        const bw = Math.floor(r() * 5) + 1, bh = Math.floor(r() * 3) + 1;
        gRect(ctx, Math.floor(bx + Math.sin(t * 0.22 + i) * 1.5), by, bw, bh, '#0e0e18', 0.9);
      });
      const sy = Math.floor((t * 6) % GH);
      gRect(ctx, 0, sy, GW, 1, '#00ff44', 0.10);
      gRect(ctx, 0, (sy+1)%GH, GW, 1, '#00ff44', 0.04);
      if (Math.sin(t * 13) > 0.88) {
        const sx = 38 + Math.floor(Math.sin(t*41)*4), sy2 = 19 + Math.floor(Math.cos(t*31)*3);
        gfx(ctx, sx, sy2, '#ffff66', 0.9); gfx(ctx, sx+1, sy2, '#ff8800', 0.5);
      }
    }

    function drawStation(ctx, t, rng) {
      gRect(ctx, 0, 0, GW, GH, '#020410');
      starField(ctx, t, rng, 16);
      const cx = 40, cy = 20;
      gRect(ctx, cx-26, cy-1, 52, 3, '#181826');
      gRect(ctx, cx-1, cy-16, 3, 32, '#181826');
      gRect(ctx, cx-5, cy-4, 10, 8, '#1e2034');
      gRect(ctx, cx-4, cy-5, 8, 10, '#1e2034');
      [[cx-28,cy-3,5,7],[cx+23,cy-3,5,7],[cx-3,cy-18,7,5],[cx-3,cy+13,7,5]]
        .forEach(([x,y,w,h]) => gRect(ctx,x,y,w,h,'#1a1a2c'));
      const wp = 0.6 + 0.4 * Math.sin(t * 0.7);
      [[cx-24,cy],[cx-20,cy],[cx+19,cy],[cx+23,cy],[cx,cy-15],[cx,cy+12]]
        .forEach(([wx,wy]) => { gfx(ctx,wx,wy,'#ffcc44',0.65*wp); gfx(ctx,wx,wy,'#ffee88',0.25*wp); });
      gRect(ctx, cx-3, cy-2, 6, 4, '#060616');
      gfx(ctx,cx-2,cy,'#00aaff',0.35); gfx(ctx,cx+1,cy,'#00aaff',0.35);
      gRect(ctx,cx-35,cy-3,7,2,'#0a1020'); gRect(ctx,cx+28,cy-3,7,2,'#0a1020');
      gRect(ctx,cx-35,cy+1,7,2,'#0a1020'); gRect(ctx,cx+28,cy+1,7,2,'#0a1020');
    }

    function drawCombat(ctx, t, rng) {
      gRect(ctx, 0, 0, GW, GH, '#08020a');
      const ins = 0.35 + 0.25 * Math.abs(Math.sin(t * 2.3));
      ctx.globalAlpha = ins * 0.5; ctx.fillStyle = '#cc1100';
      ctx.fillRect(22*P,8*P,36*P,24*P);
      ctx.globalAlpha = ins * 0.28; ctx.fillStyle = '#ff4400';
      ctx.fillRect(30*P,13*P,20*P,14*P); ctx.globalAlpha = 1;
      [[40,20],[37,16],[43,16],[34,14],[46,14],[35,19],[45,19],
       [37,23],[43,23],[40,15],[40,25],[33,20],[47,20]].forEach(([gx,gy],i) => {
        if (Math.sin(t*(3+i*0.4)+i*0.7) <= 0) return;
        const d = Math.sqrt((gx-40)**2+(gy-20)**2);
        const col = d<3?'#ffffff':d<5?'#ffdd00':d<8?'#ff6600':'#cc1100';
        gfx(ctx,gx,gy,col,0.6+0.4*Math.sin(t*5+i));
      });
      // Enemy silhouette
      const ex=15, ey=10;
      gRect(ctx,ex,ey,4,4,'#060202'); gRect(ctx,ex-1,ey+4,6,9,'#060202');
      gRect(ctx,ex-3,ey+5,3,2,'#060202'); gRect(ctx,ex+4,ey+5,4,2,'#060202');
      gRect(ctx,ex,ey+13,2,5,'#060202'); gRect(ctx,ex+2,ey+13,2,5,'#060202');
      gfx(ctx,ex+1,ey+1,'#ff0000',0.5+0.4*Math.sin(t*4));
      gfx(ctx,ex+3,ey+1,'#ff0000',0.5+0.4*Math.sin(t*4+0.8));
      const beamA = Math.max(0, Math.sin(t*5));
      if (beamA > 0.1) gRect(ctx,ex+6,ey+6,28,1,'#ff3300',beamA*0.8);
      if (Math.sin(t*5) > 0.7) {
        gRect(ctx,57,19,6,3,'#ffffff',0.7); gRect(ctx,54,18,9,5,'#ffcc00',0.4);
      }
    }

    function drawAlien(ctx, t, rng) {
      gRect(ctx, 0, 0, GW, GH, '#010208');
      gRect(ctx, 0, 32, GW, 8, '#04090a');
      for (let y = 0; y < 32; y++) {
        gRect(ctx, 0, y, Math.floor(10 + Math.sin(y*0.35+t*0.2)*2), 1, '#050e0a', 0.8);
        gRect(ctx, GW-Math.floor(10+Math.cos(y*0.28+t*0.15)*2), y, 11, 1, '#040c08', 0.8);
      }
      [[14,9,'#00ffcc'],[21,17,'#00ddff'],[50,13,'#44ffaa'],[60,21,'#00ffcc'],
       [34,7,'#88ffcc'],[45,24,'#00ddff'],[9,27,'#44ffaa'],[70,15,'#00ffcc'],
       [27,31,'#00ffcc'],[54,29,'#44ffaa'],[39,4,'#00ddff'],[62,8,'#88ffcc']]
        .forEach(([gx,gy,col],i) => {
          const p = Math.max(0, Math.sin(t*(1.1+i*0.13)+i*0.85));
          gfx(ctx,gx,gy,col,p*0.9);
          if (p > 0.6) [[gx-1,gy],[gx+1,gy],[gx,gy-1],[gx,gy+1]]
            .forEach(([nx,ny]) => gfx(ctx,nx,ny,col,(p-0.6)*0.5));
        });
      const ax=34, ay=7;
      gRect(ctx,ax+2,ay,3,5,'#020604'); gRect(ctx,ax+3,ay+5,2,3,'#020604');
      gRect(ctx,ax+1,ay+8,6,9,'#020604'); gRect(ctx,ax-2,ay+8,3,2,'#020604');
      gRect(ctx,ax+7,ay+9,4,2,'#020604'); gRect(ctx,ax-3,ay+11,2,2,'#020604');
      gRect(ctx,ax+8,ay+12,3,2,'#020604');
      gfx(ctx,ax+2,ay+1,'#ff3366',0.45+0.45*Math.sin(t*1.8));
      gfx(ctx,ax+4,ay+1,'#ff3366',0.45+0.45*Math.sin(t*1.8+0.6));
    }

    function drawHazard(ctx, t, rng) {
      gRect(ctx, 0, 0, GW, GH, '#0a0600');
      ctx.globalAlpha = 0.22; ctx.fillStyle = '#cc5500';
      for (let i = -GH; i < GW+GH; i += 16) {
        ctx.beginPath(); ctx.moveTo(i*P,0); ctx.lineTo((i+8)*P,0);
        ctx.lineTo((i+8-GH)*P,GH*P); ctx.lineTo((i-GH)*P,GH*P);
        ctx.closePath(); ctx.fill();
      }
      ctx.globalAlpha = 1;
      const pulse = 0.35 + 0.35 * Math.abs(Math.sin(t * 1.6));
      ctx.globalAlpha = pulse * 0.5; ctx.fillStyle = '#ff5500';
      ctx.fillRect(18*P,6*P,44*P,28*P); ctx.globalAlpha = 1;
      // "!" symbol
      gRect(ctx,38,9,4,10,'#ffaa00',pulse+0.3);
      gRect(ctx,38,21,4,3,'#ffaa00',pulse+0.3);
      if (Math.sin(t*8) > 0.5) {
        gRect(ctx,0,0,GW,1,'#ff4400',0.55); gRect(ctx,0,GH-1,GW,1,'#ff4400',0.55);
        gRect(ctx,0,0,1,GH,'#ff4400',0.55); gRect(ctx,GW-1,0,1,GH,'#ff4400',0.55);
      }
    }

    function drawDeath(ctx, t, rng) {
      gRect(ctx, 0, 0, GW, GH, '#060000');
      ctx.globalAlpha = 0.25 + 0.15*Math.abs(Math.sin(t*0.5));
      ctx.fillStyle = '#550000'; ctx.fillRect(0,0,GW*P,GH*P); ctx.globalAlpha = 1;
      for (let gy = 0; gy < GH; gy++) {
        const n = Math.sin(t*18+gy*7.1)*Math.cos(t*11+gy*3.9);
        if (Math.abs(n) > 0.82) gRect(ctx,0,gy,GW,1,'#330000',0.4);
      }
      for (let i = 0; i < 30; i++) {
        const gx = Math.floor((Math.sin(t*97+i*37.1)*0.5+0.5)*GW);
        const gy = Math.floor((Math.cos(t*71+i*51.3)*0.5+0.5)*GH);
        gfx(ctx,gx,gy,'#220000',0.5);
      }
      gRect(ctx,0,GH/2,GW,1,'#660000',0.3);
    }

    const SCENES = { void:drawVoid, ship:drawShip, derelict:drawDerelict,
      station:drawStation, combat:drawCombat, alien:drawAlien,
      hazard:drawHazard, death:drawDeath };

    function renderScene(canvas, sceneName, t, turn) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      (SCENES[sceneName] || SCENES.void)(ctx, t, seededRng(turn*1337+7));
      ctx.globalAlpha = 1;
    }

    // ── GAME DATA ─────────────────────────────────────────────────────────────

    const CLASSES = [
      { id:"pilot",   name:"PILOT",   desc:"Expert navigator. High evasion, ship system bonuses.", hp:90,  shield:30, credits:150, items:["Nav Charts","Emergency Flare"] },
      { id:"hacker",  name:"HACKER",  desc:"Digital ghost. Can access locked systems and override security.", hp:75,  shield:20, credits:200, items:["Exploit Kit","Data Scrambler"] },
      { id:"soldier", name:"SOLDIER", desc:"Combat hardened. Survives what others can't.", hp:120, shield:15, credits:100, items:["Combat Armor","Stim Pack"] },
    ];

    const SYSTEM_PROMPT = `You are the narrator for VOID RUNNER — a brutal sci-fi roguelike text adventure set in the far future. The player is alone in deep space, making desperate choices to survive.

TONE: Grim, tense, atmospheric. Think Alien, Dead Space, Firefly. Brief dark humor is fine. Keep it grounded and dangerous. Be specific — name ships, stations, alien species, corporations.

RESPONSE FORMAT (strict):
1. Write 2-3 short paragraphs of atmospheric narrative. Be vivid and tense.
2. End EVERY response with a JSON block in <STATE> tags:

<STATE>
{
  "hp_change": 0,
  "shield_change": 0,
  "credits_change": 0,
  "xp_gain": 10,
  "add_items": [],
  "remove_items": [],
  "scene": "void",
  "status": "Brief one-line status message",
  "choices": ["Choice A", "Choice B", "Choice C"]
}
</STATE>

STRICT RULES:
- hp_change: integer delta. Combat: -5 to -30. Death: enough to kill them.
- shield_change: integer delta. Safe areas slowly regenerate shields (+5 to +15).
- credits_change: integer delta. Looting: +20 to +150.
- xp_gain: 5-25 per meaningful event.
- add_items / remove_items: array of item name strings.
- scene: one of "void" (open space/transit), "ship" (functional vessel interior), "derelict" (wrecked/abandoned interior), "station" (space station), "combat" (active fight), "alien" (alien world or creature encounter), "hazard" (environmental danger). Match the current encounter.
- choices: always 2-4 meaningful choices with real tradeoffs. Never trivial options.
- React to the player's class and inventory. A soldier fights differently than a hacker.
- Each run should feel unique — derelict ships, alien anomalies, pirates, rogue AIs, corporate mercs, distress signals.
- When the player dies, write a vivid death scene. Set hp_change to kill them.`;

    // ── STYLES ────────────────────────────────────────────────────────────────

    const css = `
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:#060a12; --surface:#0c1220; --border:#192038;
        --cyan:#00e5ff; --cyan-dim:rgba(0,229,255,0.1);
        --gold:#ffd740; --red:#ff1744; --green:#00e676;
        --text:#b8cce0; --muted:#3d5470;
      }
      .vr { font-family:'Share Tech Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; position:relative; overflow:hidden; }
      .stars { position:fixed; inset:0; pointer-events:none; z-index:0;
        background:
          radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.55) 0%,transparent 100%),
          radial-gradient(1px 1px at 22% 57%,rgba(255,255,255,.35) 0%,transparent 100%),
          radial-gradient(1px 1px at 37% 28%,rgba(255,255,255,.45) 0%,transparent 100%),
          radial-gradient(1px 1px at 53% 72%,rgba(255,255,255,.3) 0%,transparent 100%),
          radial-gradient(1px 1px at 68% 18%,rgba(255,255,255,.5) 0%,transparent 100%),
          radial-gradient(1px 1px at 82% 48%,rgba(255,255,255,.35) 0%,transparent 100%),
          radial-gradient(1px 1px at 14% 83%,rgba(255,255,255,.45) 0%,transparent 100%),
          radial-gradient(2px 2px at 50% 50%,rgba(0,229,255,.08) 0%,transparent 100%); }
      .scanlines { position:fixed; inset:0; pointer-events:none; z-index:1;
        background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px); }
      .content { position:relative; z-index:2; }

      /* MENU */
      .menu { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2.5rem; }
      .menu-logo { font-family:'Orbitron',monospace; font-size:clamp(3rem,9vw,6rem); font-weight:900; color:var(--cyan); letter-spacing:.2em; animation:glow 3s ease-in-out infinite; }
      .menu-sub { font-family:'Orbitron',monospace; font-size:.75rem; color:var(--muted); letter-spacing:.35em; margin-top:-.8rem; }
      @keyframes glow {
        0%,100% { text-shadow:0 0 30px rgba(0,229,255,.4),0 0 80px rgba(0,229,255,.15); }
        50% { text-shadow:0 0 50px rgba(0,229,255,.7),0 0 120px rgba(0,229,255,.3); } }
      .menu-notice { font-size:.72rem; color:var(--muted); border:1px solid var(--border); padding:.75rem 1.5rem; text-align:center; max-width:380px; line-height:1.7; letter-spacing:.05em; }

      /* APIKEY */
      .apikey { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.75rem; padding:2rem; }
      .apikey-title { font-family:'Orbitron',monospace; font-size:1rem; color:var(--cyan); letter-spacing:.35em; }
      .apikey-notice { font-size:.7rem; color:var(--muted); border:1px solid var(--border); padding:.75rem 1.5rem; text-align:center; max-width:420px; line-height:1.8; letter-spacing:.05em; }
      .apikey-notice a { color:var(--cyan); text-decoration:none; }
      .apikey-notice a:hover { text-decoration:underline; }
      .field-input { background:var(--surface); border:none; border-bottom:2px solid var(--cyan); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:1rem; padding:.7rem 1rem; width:100%; max-width:420px; outline:none; text-align:center; letter-spacing:.1em; }
      .field-input::placeholder { color:var(--muted); }

      /* BUTTONS */
      .btn { font-family:'Orbitron',monospace; background:transparent; border:2px solid var(--cyan); color:var(--cyan); padding:.9rem 2.5rem; font-size:.85rem; font-weight:700; letter-spacing:.3em; cursor:pointer; transition:all .18s; position:relative; overflow:hidden; }
      .btn::after { content:''; position:absolute; inset:0; background:var(--cyan); transform:translateX(-100%); transition:transform .18s; z-index:-1; }
      .btn:hover::after { transform:translateX(0); }
      .btn:hover { color:#000; }
      .btn:disabled { opacity:.35; cursor:not-allowed; }
      .btn:disabled:hover::after { transform:translateX(-100%); }
      .btn:disabled:hover { color:var(--cyan); }
      .btn-ghost { background:none; border:none; color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:.75rem; cursor:pointer; letter-spacing:.1em; transition:color .15s; }
      .btn-ghost:hover { color:var(--text); }

      /* CREATE */
      .create { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem; padding:2rem; }
      .create-title { font-family:'Orbitron',monospace; font-size:1rem; color:var(--cyan); letter-spacing:.35em; }
      .name-input { background:var(--surface); border:none; border-bottom:2px solid var(--cyan); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:1.4rem; padding:.7rem 1rem; width:100%; max-width:380px; outline:none; text-align:center; letter-spacing:.15em; }
      .name-input::placeholder { color:var(--muted); }
      .class-label { font-family:'Orbitron',monospace; font-size:.55rem; color:var(--muted); letter-spacing:.35em; }
      .class-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; width:100%; max-width:680px; }
      .class-card { background:var(--surface); border:1px solid var(--border); padding:1.4rem 1rem; cursor:pointer; transition:all .18s; text-align:center; }
      .class-card:hover,.class-card.sel { border-color:var(--cyan); background:var(--cyan-dim); }
      .class-card.sel { border-width:2px; }
      .class-name { font-family:'Orbitron',monospace; font-size:.8rem; font-weight:700; color:var(--cyan); margin-bottom:.5rem; letter-spacing:.2em; }
      .class-desc { font-size:.7rem; color:var(--muted); line-height:1.55; margin-bottom:.75rem; }
      .class-stats { font-size:.68rem; color:var(--text); line-height:1.9; }

      /* GAME LAYOUT */
      .game { display:grid; grid-template-columns:210px 1fr; grid-template-rows:52px 160px 1fr auto; height:100vh; max-height:100vh; }
      .g-header { grid-column:1/-1; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 1.25rem; }
      .g-logo { font-family:'Orbitron',monospace; font-size:.85rem; font-weight:900; color:var(--cyan); letter-spacing:.25em; }
      .g-meta { font-size:.65rem; color:var(--muted); letter-spacing:.1em; }
      .sidebar { grid-row:2/5; background:var(--surface); border-right:1px solid var(--border); padding:.9rem; overflow-y:auto; display:flex; flex-direction:column; gap:1.1rem; }
      .canvas-panel { grid-column:2; background:#010308; border-bottom:1px solid var(--border); overflow:hidden; position:relative; }
      .canvas-panel canvas { width:100%; height:100%; display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
      .scene-label { position:absolute; bottom:4px; right:8px; font-family:'Orbitron',monospace; font-size:.45rem; color:rgba(0,229,255,.3); letter-spacing:.2em; pointer-events:none; }
      .s-label { font-family:'Orbitron',monospace; font-size:.5rem; color:var(--muted); letter-spacing:.25em; margin-bottom:.2rem; }
      .bar-bg { background:rgba(255,255,255,.05); height:5px; border-radius:3px; overflow:hidden; margin-bottom:.2rem; }
      .bar-fill { height:100%; border-radius:3px; transition:width .5s ease,background-color .5s ease; }
      .s-val { font-size:.72rem; color:var(--text); }
      .inv-item { font-size:.68rem; color:var(--text); padding:.28rem .5rem; border:1px solid var(--border); margin-bottom:.28rem; background:rgba(255,255,255,.02); }
      .inv-item::before { content:"▸ "; color:var(--cyan); }
      .inv-empty { font-size:.68rem; color:var(--muted); }

      /* LOG */
      .log { grid-column:2; overflow-y:auto; padding:1.25rem 1.5rem; display:flex; flex-direction:column; gap:.9rem; }
      .log-narrative { font-size:.83rem; line-height:1.85; color:var(--text); border-left:2px solid var(--border); padding-left:1rem; }
      .log-player { font-size:.78rem; color:var(--cyan); }
      .log-status { font-size:.7rem; color:var(--gold); letter-spacing:.1em; }
      .log-error { font-size:.73rem; color:var(--red); animation:blink 1s step-end infinite; }
      .log-level { font-size:.73rem; color:var(--green); letter-spacing:.1em; }
      @keyframes blink { 50% { opacity:0; } }
      .thinking { font-size:.72rem; color:var(--muted); letter-spacing:.2em; animation:blink 1.2s step-end infinite; }

      /* INPUT */
      .input-area { grid-column:2; background:var(--surface); border-top:1px solid var(--border); padding:.85rem 1.25rem; }
      .choices { display:flex; flex-wrap:wrap; gap:.45rem; margin-bottom:.7rem; }
      .choice-btn { background:transparent; border:1px solid var(--border); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:.72rem; padding:.45rem .9rem; cursor:pointer; transition:all .15s; letter-spacing:.05em; }
      .choice-btn:hover { border-color:var(--cyan); color:var(--cyan); background:var(--cyan-dim); }
      .custom-row { display:flex; gap:.5rem; align-items:center; }
      .caret { color:var(--muted); font-size:.85rem; }
      .custom-input { flex:1; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--cyan); font-family:'Share Tech Mono',monospace; font-size:.82rem; padding:.35rem 0; outline:none; }
      .custom-input::placeholder { color:var(--muted); }
      .custom-input:focus { border-color:var(--cyan); }
      .send-btn { background:transparent; border:1px solid var(--muted); color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:.7rem; padding:.35rem .7rem; cursor:pointer; transition:all .15s; }
      .send-btn:hover { border-color:var(--cyan); color:var(--cyan); }

      /* DEAD */
      .dead { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem; padding:2rem; }
      .dead-title { font-family:'Orbitron',monospace; font-size:clamp(2rem,7vw,4.5rem); font-weight:900; color:var(--red); letter-spacing:.2em; text-shadow:0 0 40px rgba(255,23,68,.6); animation:flicker .2s infinite; }
      @keyframes flicker { 0%,100% { opacity:1; } 50% { opacity:.8; } }
      .dead-sub { font-family:'Orbitron',monospace; font-size:.65rem; color:var(--muted); letter-spacing:.35em; margin-top:-1.2rem; }
      .dead-panel { background:var(--surface); border:1px solid rgba(255,23,68,.25); padding:1.75rem; min-width:300px; }
      .dead-head { font-family:'Orbitron',monospace; font-size:.55rem; color:var(--red); letter-spacing:.25em; margin-bottom:1rem; }
      .dead-row { display:flex; justify-content:space-between; font-size:.75rem; border-bottom:1px solid var(--border); padding:.4rem 0; }
      .dead-row:last-child { border-bottom:none; }
      .dead-lbl { color:var(--muted); }
      .dead-val { color:var(--text); }

      @media (max-width:580px) {
        .game { grid-template-columns:1fr; grid-template-rows:52px 120px auto 1fr auto; }
        .sidebar { grid-row:auto; border-right:none; border-bottom:1px solid var(--border); flex-direction:row; flex-wrap:wrap; gap:1rem; }
        .canvas-panel { grid-column:1; height:120px; }
        .log { grid-column:1; }
        .input-area { grid-column:1; }
        .class-grid { grid-template-columns:1fr; }
      }
    `;

    // ── COMPONENTS ────────────────────────────────────────────────────────────

    function Bar({ pct, color }) {
      return <div className="bar-bg"><div className="bar-fill" style={{ width:`${pct}%`, background:color }} /></div>;
    }

    function VoidRunner() {
      const [screen, setScreen]           = useState("apikey");
      const [apiKey, setApiKey]           = useState(() => localStorage.getItem("vr_apikey") || "");
      const [apiKeyInput, setApiKeyInput] = useState("");
      const [playerName, setPlayerName]   = useState("");
      const [cls, setCls]                 = useState(null);
      const [gs, setGs]                   = useState(null);
      const [log, setLog]                 = useState([]);
      const [choices, setChoices]         = useState([]);
      const [customInput, setCustomInput] = useState("");
      const [history, setHistory]         = useState([]);
      const [loading, setLoading]         = useState(false);
      const [runStats, setRunStats]       = useState(null);
      const logRef    = useRef(null);
      const canvasRef = useRef(null);
      const sceneRef  = useRef("void");
      const turnRef   = useRef(0);

      useEffect(() => { if (apiKey) setScreen("menu"); }, []);

      useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
      }, [log, loading]);

      // Canvas animation loop — runs whenever we're on the game screen
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        let rafId;
        const loop = () => {
          renderScene(canvas, sceneRef.current, performance.now() / 1000, turnRef.current);
          rafId = requestAnimationFrame(loop);
        };
        rafId = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(rafId);
      }, [screen === "game"]);

      const saveApiKey = () => {
        const key = apiKeyInput.trim(); if (!key) return;
        localStorage.setItem("vr_apikey", key);
        setApiKey(key); setScreen("menu");
      };

      const initGs = (c) => ({
        name:playerName, class:c.name,
        hp:c.hp, maxHp:c.hp, shield:c.shield, maxShield:c.shield,
        credits:c.credits, xp:0, level:1, inventory:[...c.items], turn:0,
      });

      const applyUpdate = (cur, u) => {
        let next = { ...cur };
        next.hp      = Math.max(0, Math.min(next.maxHp,     next.hp      + (u.hp_change      || 0)));
        next.shield  = Math.max(0, Math.min(next.maxShield, next.shield  + (u.shield_change  || 0)));
        next.credits = Math.max(0,                           next.credits + (u.credits_change || 0));
        next.xp     += (u.xp_gain || 0); next.turn += 1;
        if (u.add_items?.length)    next.inventory = [...next.inventory, ...u.add_items];
        if (u.remove_items?.length) next.inventory = next.inventory.filter(i => !u.remove_items.includes(i));
        const newLevel = Math.floor(next.xp / 150) + 1;
        if (newLevel > next.level) { next.level = newLevel; next.maxHp += 15; next.hp = Math.min(next.maxHp, next.hp + 25); return { gs:next, leveled:true }; }
        return { gs:next, leveled:false };
      };

      const callAI = async (msgs, currentGs) => {
        setLoading(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{ "Content-Type":"application/json", "x-api-key":apiKey,
              "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
            body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:SYSTEM_PROMPT, messages:msgs }),
          });
          if (res.status === 401) {
            localStorage.removeItem("vr_apikey"); setApiKey(""); setScreen("apikey"); setApiKeyInput("");
            setLog(prev => [...prev, { type:"error", text:"[AUTH FAILED — INVALID API KEY]" }]);
            return msgs;
          }
          const data = await res.json();
          const raw = data.content?.[0]?.text || "";
          const match = raw.match(/<STATE>([\s\S]*?)<\/STATE>/);
          let upd = { hp_change:0, shield_change:0, credits_change:0, xp_gain:5, add_items:[], remove_items:[], scene:"void", status:"", choices:["Look around","Check status","Move on"] };
          if (match) { try { upd = { ...upd, ...JSON.parse(match[1]) }; } catch (_) {} }

          const narrative = raw.replace(/<STATE>[\s\S]*?<\/STATE>/,"").trim();
          const { gs:nextGs, leveled } = applyUpdate(currentGs, upd);

          sceneRef.current = upd.scene || "void";
          turnRef.current  = nextGs.turn;
          setGs(nextGs);
          setLog(prev => [
            ...prev,
            { type:"narrative", text:narrative },
            ...(upd.status ? [{ type:"status", text:upd.status }] : []),
            ...(leveled    ? [{ type:"level",  text:`▲ LEVEL UP — Now level ${nextGs.level}. Hull upgraded.` }] : []),
          ]);
          setChoices(upd.choices || []);
          if (nextGs.hp <= 0) {
            sceneRef.current = "death";
            setRunStats(nextGs);
            setTimeout(() => setScreen("dead"), 2500);
          }
          return [...msgs, { role:"assistant", content:raw }];
        } catch (_) {
          setLog(prev => [...prev, { type:"error", text:"[SIGNAL LOST — RECONNECTING...]" }]);
          return msgs;
        } finally { setLoading(false); }
      };

      const startGame = async () => {
        const c = CLASSES.find(c => c.id === cls);
        if (!playerName.trim() || !c) return;
        const g = initGs(c);
        sceneRef.current = "void"; turnRef.current = 0;
        setGs(g); setLog([]); setChoices([]); setScreen("game");
        const open = { role:"user", content:`NEW RUN — Player: ${g.name} | Class: ${c.name} | HP: ${c.hp} | Shield: ${c.shield} | Credits: ${c.credits} | Items: ${c.items.join(", ")}. Start immediately — something is already going wrong. Drop the player into the action.` };
        const h = [open]; setHistory(h);
        const updated = await callAI(h, g); setHistory(updated);
      };

      const handleAction = async (action) => {
        if (loading || !gs || gs.hp <= 0 || !action) return;
        const msg = { role:"user", content:`${action}\n\n[HP: ${gs.hp}/${gs.maxHp} | Shield: ${gs.shield} | Credits: ${gs.credits} | Items: ${gs.inventory.join(", ")}]` };
        const newH = [...history, msg];
        setLog(prev => [...prev, { type:"player", text:`▸ ${action}` }]);
        setChoices([]);
        const updated = await callAI(newH, gs); setHistory(updated);
        setCustomInput("");
      };

      const hpPct  = gs ? (gs.hp / gs.maxHp) * 100 : 100;
      const shdPct = gs ? (gs.shield / gs.maxShield) * 100 : 100;
      const xpPct  = gs ? ((gs.xp % 150) / 150) * 100 : 0;
      const hpCol  = hpPct > 50 ? "#00e5ff" : hpPct > 25 ? "#ffd740" : "#ff1744";

      return (
        <div className="vr">
          <style>{css}</style>
          <div className="stars" /><div className="scanlines" />
          <div className="content">

            {screen === "apikey" && (
              <div className="apikey">
                <div><div className="menu-logo">VOID RUNNER</div><div className="menu-sub">Deep Space Survival Protocol</div></div>
                <div className="apikey-title">— AUTHENTICATION REQUIRED —</div>
                <div className="apikey-notice">
                  This game calls the Claude API directly from your browser.<br />
                  Your key is saved locally and never sent anywhere except Anthropic.<br /><br />
                  Get a key at <a href="https://console.anthropic.com" target="_blank" rel="noreferrer">console.anthropic.com</a>
                </div>
                <input className="field-input" placeholder="sk-ant-..." type="password"
                  value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && saveApiKey()} autoFocus />
                <button className="btn" onClick={saveApiKey} disabled={!apiKeyInput.trim()}>AUTHENTICATE</button>
              </div>
            )}

            {screen === "menu" && (
              <div className="menu">
                <div><div className="menu-logo">VOID RUNNER</div><div className="menu-sub">Deep Space Survival Protocol</div></div>
                <div className="menu-notice">PERMADEATH ENABLED<br />Each sector is procedurally generated by AI.<br />No two runs are alike. Most end badly.</div>
                <button className="btn" onClick={() => setScreen("create")}>INITIALIZE RUN</button>
                <button className="btn-ghost" onClick={() => { localStorage.removeItem("vr_apikey"); setApiKey(""); setApiKeyInput(""); setScreen("apikey"); }}>change api key</button>
              </div>
            )}

            {screen === "create" && (
              <div className="create">
                <div className="create-title">— CREW MANIFEST —</div>
                <input className="name-input" placeholder="ENTER DESIGNATION" value={playerName}
                  onChange={e => setPlayerName(e.target.value)} maxLength={20} autoFocus />
                <div className="class-label">SELECT SPECIALIZATION</div>
                <div className="class-grid">
                  {CLASSES.map(c => (
                    <div key={c.id} className={`class-card ${cls === c.id ? "sel" : ""}`} onClick={() => setCls(c.id)}>
                      <div className="class-name">{c.name}</div>
                      <div className="class-desc">{c.desc}</div>
                      <div className="class-stats">HP: {c.hp} · SHD: {c.shield}<br />CR: {c.credits}<br />{c.items.join(" · ")}</div>
                    </div>
                  ))}
                </div>
                <button className="btn" onClick={startGame} disabled={!playerName.trim() || !cls}>DEPLOY</button>
                <button className="btn-ghost" onClick={() => setScreen("menu")}>← ABORT</button>
              </div>
            )}

            {screen === "game" && gs && (
              <div className="game">
                <div className="g-header">
                  <div className="g-logo">VOID RUNNER</div>
                  <div className="g-meta">{gs.name} · {gs.class} · SECTOR {gs.turn} · LVL {gs.level}</div>
                </div>
                <div className="sidebar">
                  <div><div className="s-label">Hull Integrity</div><Bar pct={hpPct} color={hpCol} /><div className="s-val">{gs.hp} / {gs.maxHp}</div></div>
                  <div><div className="s-label">Shields</div><Bar pct={shdPct} color="#4fc3f7" /><div className="s-val">{gs.shield} / {gs.maxShield}</div></div>
                  <div><div className="s-label">XP — Level {gs.level}</div><Bar pct={xpPct} color="#00e676" /><div className="s-val">{gs.xp % 150} / 150</div></div>
                  <div><div className="s-label">Credits</div><div className="s-val" style={{ color:"#ffd740", fontSize:".95rem" }}>◈ {gs.credits}</div></div>
                  <div style={{ flex:1 }}>
                    <div className="s-label" style={{ marginBottom:".5rem" }}>Inventory</div>
                    {gs.inventory.length === 0
                      ? <div className="inv-empty">Nothing</div>
                      : gs.inventory.map((item,i) => <div key={i} className="inv-item">{item}</div>)}
                  </div>
                </div>
                <div className="canvas-panel">
                  <canvas ref={canvasRef} width={160} height={80} />
                  <div className="scene-label">{sceneRef.current?.toUpperCase()}</div>
                </div>
                <div className="log" ref={logRef}>
                  {log.map((e,i) => <div key={i} className={`log-${e.type === "level" ? "level" : e.type}`}>{e.text}</div>)}
                  {loading && <div className="thinking">▌ TRANSMITTING...</div>}
                </div>
                <div className="input-area">
                  {!loading && choices.length > 0 && (
                    <div className="choices">
                      {choices.map((c,i) => <button key={i} className="choice-btn" onClick={() => handleAction(c)}>{c}</button>)}
                    </div>
                  )}
                  <div className="custom-row">
                    <span className="caret">▸</span>
                    <input className="custom-input" placeholder="or type a custom action..."
                      value={customInput} onChange={e => setCustomInput(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && handleAction(customInput.trim())}
                      disabled={loading} />
                    <button className="send-btn" onClick={() => handleAction(customInput.trim())} disabled={loading}>SEND</button>
                  </div>
                </div>
              </div>
            )}

            {screen === "dead" && runStats && (
              <div className="dead">
                <div className="dead-title">YOU DIED</div>
                <div className="dead-sub">TRANSMISSION TERMINATED</div>
                <div className="dead-panel">
                  <div className="dead-head">— RUN REPORT —</div>
                  {[["Designation",runStats.name],["Specialization",runStats.class],
                    ["Sectors Survived",runStats.turn],["Level Reached",runStats.level],
                    ["Total XP",runStats.xp],["Credits at Death",`◈ ${runStats.credits}`],
                    ["Items Carried",runStats.inventory.join(", ")||"None"]].map(([l,v]) => (
                    <div key={l} className="dead-row"><span className="dead-lbl">{l}</span><span className="dead-val">{v}</span></div>
                  ))}
                </div>
                <button className="btn" onClick={() => { setScreen("create"); setLog([]); setChoices([]); setHistory([]); setGs(null); setRunStats(null); sceneRef.current="void"; }}>RUN AGAIN</button>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<VoidRunner />);
  </script>
</body>
</html>
